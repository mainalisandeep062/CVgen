<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <title>CVgen Verification Code</title>
</head>
<body style="font-family: Arial, sans-serif; margin: 0; padding: 20px; background-color: #f5f5f5;">
    <table width="100%" cellpadding="0" cellspacing="0" style="max-width: 480px; margin: 0 auto; background-color: #ffffff; border-radius: 8px; padding: 32px;">
        <tr>
            <td style="text-align: center; padding-bottom: 24px;">
                <h2 style="color: #1a1a2e; margin: 0;">CVgen</h2>
            </td>
        </tr>
        <tr>
            <td style="padding-bottom: 16px;">
                <p style="color: #333333; font-size: 16px; margin: 0;">
                    Your verification code is:
                </p>
            </td>
        </tr>
        <tr>
            <td style="text-align: center; padding: 24px 0;">
                <span style="font-size: 36px; font-weight: bold; letter-spacing: 8px; color: #1a1a2e; font-family: monospace;" th:text="${otp}">000000</span>
            </td>
        </tr>
        <tr>
            <td style="padding-bottom: 16px;">
                <p style="color: #666666; font-size: 14px; margin: 0;">
                    This code will expire in <strong th:text="${expiryMinutes}">10</strong> minutes.
                </p>
            </td>
        </tr>
        <tr>
            <td style="padding-bottom: 16px;">
                <p style="color: #999999; font-size: 13px; margin: 0;" th:if="${purpose == 'SIGNUP'}">
                    Purpose: Account registration
                </p>
                <p style="color: #999999; font-size: 13px; margin: 0;" th:if="${purpose == 'LOGIN'}">
                    Purpose: Account login
                </p>
            </td>
        </tr>
        <tr>
            <td style="border-top: 1px solid #eeeeee; padding-top: 16px;">
                <p style="color: #999999; font-size: 12px; margin: 0;">
                    If you did not request this code, you can safely ignore this email.
                </p>
            </td>
        </tr>
    </table>
</body>
</html>
