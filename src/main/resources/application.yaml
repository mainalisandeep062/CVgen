spring:
  application:
    name: ${APP_NAME}
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID:}
            client-secret: ${GOOGLE_CLIENT_SECRET:}
            authorization-grant-type: authorization_code
            scope: ${GOOGLE_OAUTH_SCOPES}
          github:
            client-id: ${GITHUB_CLIENT_ID:}
            client-secret: ${GITHUB_CLIENT_SECRET:}
            authorization-grant-type: authorization_code
            scope: ${GITHUB_OAUTH_SCOPES}
          linkedin:
            provider: linkedin
            client-id: ${LINKEDIN_CLIENT_ID:}
            client-secret: ${LINKEDIN_CLIENT_SECRET:}
            client-authentication-method: client_secret_post
            authorization-grant-type: authorization_code
            redirect-uri: "{baseUrl}/login/oauth2/code/linkedin"
            scope: ${LINKEDIN_OAUTH_SCOPES}
        provider:
          linkedin:
            authorization-uri: ${LINKEDIN_AUTHORIZATION_URI}
            token-uri: ${LINKEDIN_TOKEN_URI}
            user-info-uri: ${LINKEDIN_USER_INFO_URI}
            jwk-set-uri: https://www.linkedin.com/oauth/openid/jwks
            user-name-attribute: ${LINKEDIN_USER_NAME_ATTRIBUTE}
  datasource:
    url: ${DATABASE_URL}
    username: ${DATABASE_USERNAME}
    password: ${DATABASE_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  liquibase:
    change-log: classpath:changelog/changelog-master.xml
  mail:
    host: ${MAIL_HOST:localhost}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: ${MAIL_SMTP_AUTH:true}
          starttls:
            enable: ${MAIL_SMTP_STARTTLS:true}
    from: ${MAIL_FROM:no-reply@cvgen.io}

app:
  security:
    jwt:
      secret: ${JWT_SECRET}
      issuer: ${JWT_ISSUER}
      expiration: ${JWT_EXPIRATION}
      clock-skew: ${JWT_CLOCK_SKEW}
    oauth2:
      redirect-uri: ${OAUTH2_REDIRECT_URI}
      success-redirect-uri: ${OAUTH2_SUCCESS_REDIRECT_URI}
      failure-redirect-uri: ${OAUTH2_FAILURE_REDIRECT_URI}
      authorized-redirect-uris: ${OAUTH2_AUTHORIZED_REDIRECT_URIS}
      access-token-cookie-name: ${OAUTH2_ACCESS_TOKEN_COOKIE_NAME}
      bearer-prefix: ${OAUTH2_BEARER_PREFIX}
      default-role: ${OAUTH2_DEFAULT_ROLE}
      google-provider-id: ${OAUTH2_GOOGLE_PROVIDER_ID}
      github-provider-id: ${OAUTH2_GITHUB_PROVIDER_ID}
      linkedin-provider-id: ${OAUTH2_LINKEDIN_PROVIDER_ID}
      secure-same-site: ${OAUTH2_SECURE_SAMESITE}
      insecure-same-site: ${OAUTH2_INSECURE_SAMESITE}
      unsupported-provider-error-code: ${OAUTH2_UNSUPPORTED_PROVIDER_ERROR_CODE}
      failure-error-code: ${OAUTH2_FAILURE_ERROR_CODE}
      email-unverified-conflict-error-code: ${OAUTH2_EMAIL_UNVERIFIED_CONFLICT_ERROR_CODE}
    messages:
      unauthorized: ${APP_SECURITY_UNAUTHORIZED_MESSAGE}
      forbidden: ${APP_SECURITY_FORBIDDEN_MESSAGE}
    cors:
      allowed-origins: ${CORS_ALLOWED_ORIGINS}
      allowed-methods: ${CORS_ALLOWED_METHODS}
      allowed-headers: ${CORS_ALLOWED_HEADERS}
      exposed-headers: ${CORS_EXPOSED_HEADERS}
      allow-credentials: ${CORS_ALLOW_CREDENTIALS}
    logout-url: ${APP_SECURITY_LOGOUT_URL}
  async:
    core-pool-size: ${ASYNC_CORE_POOL_SIZE}
    max-pool-size: ${ASYNC_MAX_POOL_SIZE}
    queue-capacity: ${ASYNC_QUEUE_CAPACITY}
    thread-name-prefix: ${ASYNC_THREAD_NAME_PREFIX:cvgen-async-}
  web:
    assets-cache-period: ${WEB_ASSETS_CACHE_PERIOD}
